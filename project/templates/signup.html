<!DOCTYPE html>
<html>
<head>
<title>Signup - Quiz App</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

  /* 🔥 White + Blue Theme */
  background: linear-gradient(135deg, #e3f2fd, #90caf9, #1e88e5);
  background-size: 200% 200%;
  animation: gradientMove 8s ease infinite;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔄 Background animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Card */
.container {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  text-align: center;

  box-shadow: 0 0 25px rgba(0, 123, 255, 0.3);
  border: 1px solid rgba(255,255,255,0.5);
  animation: fadeIn 1s ease;
}

/* Heading */
h1 {
  color: #0d47a1;
  margin-bottom: 5px;
}

h2 {
  color: #333;
  margin-bottom: 20px;
}

/* Input Fields */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  background: white;
  color: #333;
  font-size: 14px;
  transition: 0.3s;
}

input::placeholder {
  color: #888;
}

input:focus {
  border-color: #1e88e5;
  box-shadow: 0 0 10px rgba(30,136,229,0.5);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 25px;
  border: none;

  /* 🔥 Blue Gradient */
  background: linear-gradient(to right, #42a5f5, #1e88e5);

  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(30,136,229,0.6);
}

/* Back link */
a {
  display: block;
  margin-top: 15px;
  color: #0d47a1;
  text-decoration: none;
  font-weight: bold;
}

a:hover {
  text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Numbered Inputs */
.input-group {
  display: flex;
  align-items: center;
}

.input-number {
  color: #1e88e5;
  margin-right: 8px;
  font-weight: bold;
  min-width: 20px;
}

</style>
</head>

<body>

<div class="container">

  <h1>🎯 Quiz App</h1>
  <h2>Create Account</h2>

  <form method="POST">

    <div class="input-group">
      <span class="input-number">1.</span>
      <input name="first_name" placeholder="First Name" required>
    </div>

    <div class="input-group">
      <span class="input-number">2.</span>
      <input name="last_name" placeholder="Last Name" required>
    </div>

    <div class="input-group">
      <span class="input-number">3.</span>
      <input name="phone" placeholder="Phone Number" required>
    </div>

    <div class="input-group">
      <span class="input-number">4.</span>
      <input name="email" type="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <span class="input-number">5.</span>
      <input name="age" type="number" placeholder="Age" required>
    </div>

    <div class="input-group">
      <span class="input-number">6.</span>
      <input name="password" type="password" placeholder="Password" required>
    </div>

    <button type="submit">🚀 Signup</button>

  </form>

  <a href="/">← Back to Login</a>

</div>

</body>
</html>
