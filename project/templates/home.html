<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* White Card Container */
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 380px;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        /* Quiz Image */
        .quiz-img {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .quiz-img:hover {
            transform: scale(1.05);
        }

        /* Button */
        .btn {
            background: #4facfe;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        .logout {
            margin-top: 20px;
            display: block;
            color: red;
            text-decoration: none;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Proper Quiz Image -->
        <img src="https://cdn-icons-png.flaticon.com/512/201/201818.png" 
             class="quiz-img" alt="Quiz">

        <h1>Welcome {{ name }} 🎯</h1>
        <p>Test your knowledge and improve your skills!</p>
        <p>Logged in as: {{ session['user'] }}</p> 
        

        <form action="/start_quiz" method="GET">
            <button class="btn">Start Quiz</button>
        </form>

        <a href="/logout" class="logout">Logout</a>

    </div>

</body>
</html>
