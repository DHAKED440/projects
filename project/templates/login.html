<!DOCTYPE html>
<html>
<head>
<title>Login - Quiz App</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

  /* 🔥 White + Blue Background */
  background: linear-gradient(135deg, #e3f2fd, #90caf9, #1e88e5);
  background-size: 200% 200%;
  animation: gradientMove 8s ease infinite;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔄 Background Animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Card */
.container {
  background: rgba(255, 255, 255, 0.9);
  padding: 40px;
  border-radius: 20px;
  width: 360px;
  text-align: center;

  box-shadow: 0 0 25px rgba(30,136,229,0.3);
  border: 1px solid rgba(255,255,255,0.6);
  animation: fadeIn 1s ease;
}

/* Heading */
h1 {
  color: #0d47a1;
  margin-bottom: 5px;
}

h2 {
  color: #333;
  margin-bottom: 25px;
}

/* Input Fields */
.input-box {
  margin: 15px 0;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  background: white;
  color: #333;
  font-size: 14px;
  transition: 0.3s;
}

input::placeholder {
  color: #888;
}

input:focus {
  border-color: #1e88e5;
  box-shadow: 0 0 10px rgba(30,136,229,0.5);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 25px;
  border: none;

  background: linear-gradient(to right, #42a5f5, #1e88e5);

  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(30,136,229,0.6);
}

/* Signup Text */
.signup-text {
  margin-top: 18px;
  font-size: 14px;
  color: #555;
}

a {
  color: #0d47a1;
  text-decoration: none;
  font-weight: bold;
}

a:hover {
  text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>🎯 Quiz App</h1>
  <h2>Welcome Back</h2>

  <form method="POST">
    
    <div class="input-box">
      <input name="username" type="email" placeholder="📧 Enter Email" required>
    </div>

    <div class="input-box">
      <input name="password" type="password" placeholder="🔒 Enter Password" required>
    </div>

    <button type="submit">🚀 Login</button>
  </form>

  <p class="signup-text">
    Don't have an account?
    <a href="/signup">Create Account</a>
  </p>

</div>

</body>
</html>
